  <h1>The Galois Correspondence</h1>

  <!-- PLAN ---------------------------------------------------------------
  1. Galois extension: normal (contains all conjugates) + separable
     (in char 0 all extensions are separable — always true over ℚ)
  2. Fundamental theorem of Galois theory:
     Order-reversing bijection between
       subgroups H ≤ Gal(K/F)  ↔  intermediate fields F ⊆ M ⊆ K
     given by H ↦ K^H (fixed field) and M ↦ Gal(K/M)
  3. Key facts:
     - [K:M] = |Gal(K/M)|
     - [M:F] = [G : Gal(K/M)] (index of subgroup)
     - M/F is Galois iff Gal(K/M) is normal in G
  4. Worked example in full: splitting field of x⁴-2 over ℚ
     - Degree 8, Gal ≅ D₄ (dihedral group of order 8)
     - Draw the complete subgroup lattice of D₄ (10 subgroups)
     - Draw the corresponding field lattice (10 intermediate fields)
     - Identify which intermediate extensions are themselves Galois
  INTERACTIVE: clickable lattice — click a subgroup, highlight its fixed field
