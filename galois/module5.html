  <h1>Galois Acting on Torsion Points</h1>

  <!-- PLAN ---------------------------------------------------------------
  This is the bridge module from abstract Galois theory into elliptic curves.

  1. The n-torsion subgroup:
       E[n] = {P ∈ E(Q̄) : nP = O}
     As abstract group: E[n] ≅ ℤ/nℤ × ℤ/nℤ (a 2D grid of n² points)
     Proof via the torus: n-torsion = {(aω₁ + bω₂)/n : 0 ≤ a,b < n}

  2. Coordinates of torsion points are algebraic:
     They satisfy the n-division polynomial (a poly in x with coefficients in ℚ
     or the field of definition of E), so they are algebraic numbers.

  3. Galois acts: σ ∈ Gal(Q̄/ℚ) acts on coordinates of torsion points,
     sending one torsion point to another torsion point.
     Crucially this respects the group law: σ(P+Q) = σ(P) + σ(Q).

  4. The mod-n Galois representation:
     Choose a basis {P₁, P₂} of E[n] ≅ (ℤ/n)². Then each σ gives a matrix:
       ρₙ(σ)(P₁) = aP₁ + bP₂
       ρₙ(σ)(P₂) = cP₁ + dP₂
     i.e. ρₙ: Gal(Q̄/ℚ) → GL₂(ℤ/n)

  5. The Weil pairing: a bilinear map E[n] × E[n] → μₙ (n-th roots of unity)
     preserved by Galois — constrains det(ρₙ(σ)) = χ(σ) (cyclotomic character)
     so image of ρₙ lies in GSp₂ ⊆ GL₂

  6. Brief mention of the ℓ-adic representation (n = ℓᵏ, pass to limit):
       ρ_ℓ: Gal(Q̄/ℚ) → GL₂(ℤ_ℓ)
     This is the object appearing in Wiles's proof of Fermat's Last Theorem.

               show how a specific Galois element permutes them as a GL₂(ℤ/3) action
  See PLAN.md for full details.
