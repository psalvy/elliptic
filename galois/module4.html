  <h1>Solvability: Why the Quintic Breaks</h1>

  <!-- PLAN ---------------------------------------------------------------
  1. Solvable group: subnormal series G = G₀ ⊃ G₁ ⊃ ... ⊃ {e}
     where each quotient Gᵢ/Gᵢ₊₁ is abelian
     Intuition: the group can be "dismantled" into commutative layers
  2. Solvable cases:
     - S₂ ≅ ℤ/2: trivially abelian → quadratic formula
     - S₃: {e} ◁ A₃ ◁ S₃, quotients ℤ/3 and ℤ/2 → cubic formula (Cardano)
     - S₄: {e} ◁ V₄ ◁ A₄ ◁ S₄, all abelian quotients → quartic formula (Ferrari)
  3. S₅ is NOT solvable:
     - A₅ is the unique normal subgroup and is simple (no proper normal subgroups)
     - The derived series stops: [S₅,S₅] = A₅, [A₅,A₅] = A₅ — never reaches {e}
  4. Abel-Ruffini theorem: no general solution by radicals for degree ≥ 5
  5. Galois's criterion: f(x) solvable by radicals ⟺ Gal(f) is a solvable group
     (specific degree-5 polynomials with Galois group ℤ/5 ARE solvable;
      it's x⁵-x-1 type polynomials with Galois group S₅ that aren't)
  INTERACTIVE: commutator tower visualised for S₄ (terminates) vs S₅ (loops)
  See PLAN.md for full details.
