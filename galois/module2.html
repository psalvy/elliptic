  1. Roots of x²-2 are ±√2; the map σ: √2 ↦ -√2 is a field automorphism fixing ℚ
  2. Definition: Gal(K/F) = all automorphisms of K that fix F pointwise
  3. For x²-2: Gal(ℚ(√2)/ℚ) = {e, σ} ≅ ℤ/2ℤ
  4. For x²+x+1 (roots ω, ω̄): Gal = complex conjugation, again ℤ/2ℤ
  5. For x³-2: three roots ∛2, ω∛2, ω²∛2; splitting field degree 6 over ℚ
     Gal ≅ S₃ (all permutations of 3 objects)
     6 elements: identity, 2 rotations (order 3), 3 reflections (order 2)
