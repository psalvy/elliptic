  <h1>CM, Class Fields, and the Abelian Thread</h1>

  <!-- PLAN ---------------------------------------------------------------
  This module closes the loop: re-derives from the Galois side why CM forces
  algebraic (and often integer) values for j(τ) — the result stated without
  proof in Module 7 of the elliptic course.

  1. Generic curves (Serre's theorem, 1972):
     For most E/ℚ, ρₙ is surjective for all but finitely many n.
     Galois acts "as freely as possible" — the torsion has no extra structure.

  2. CM curves:
     End(E) ⊋ ℤ; the extra endomorphisms form an order O ⊂ ℚ(√-d).
     These endomorphisms commute with the Galois action (they're defined over Q̄).
     Therefore ρₙ(σ) must commute with the O/nO action on E[n].
     The centraliser of a non-trivial commutative algebra in GL₂ is abelian
     (a diagonal torus) — so the IMAGE of ρₙ is abelian.

  3. Abelian Galois representations and class field theory:
     An abelian Galois representation factors through the abelianisation of
     Gal(Q̄/ℚ(√-d)), which by class field theory is the idèle class group
     of ℚ(√-d) — controlled by ideal class groups.
     The map is: σ ↦ "the ideal class of the Frobenius at σ"

  4. Why h=1 forces j(τ) ∈ ℤ:
     h=1 means the class group is trivial → the abelian extension generated by j(τ)
     is trivial over ℚ(√-d) → j(τ) ∈ ℚ(√-d) ∩ ℚ̄^{ab} = ℚ(√-d).
     But j(τ) is also an algebraic integer → j(τ) ∈ ℤ_K ∩ ℚ = ℤ.
     (For h=1 the ring of integers of ℚ(√-d) is a PID, so ℤ_K ∩ ℚ = ℤ.)

  5. Kronecker's Jugendtraum:
     The maximal abelian extension of ℚ(√-d) is generated by j(τ) and the
     coordinates of the torsion points of the CM curve — exactly the objects
     appearing in Modules 5–7 of the elliptic course.

  6. Forward pointers:
     - Modularity theorem (Wiles 1995): all elliptic curves over ℚ are modular —
       their L-functions are L-functions of modular forms
     - Langlands program: a vast generalisation connecting Galois representations
       to automorphic forms — the frontier of modern number theory

  See PLAN.md for full details.
  ---------------------------------------------------------------------- -->
