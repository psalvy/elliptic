  <h1>The Explicit Formula: Primes from Zeros</h1>

  <!-- PLAN ---------------------------------------------------------------
  THIS IS THE KEY MODULE — the moment the user described as
  "primes emerge as the only ones that don't become zero after a smart integration"

  Step-by-step derivation:

  1. The logarithmic derivative of the Euler product:
       -ζ'(s)/ζ(s) = Σ Λ(n) n^{-s}
     where Λ(n) = log p if n = p^k, else 0 (von Mangoldt function)
     Composite integers vanish; prime powers survive.
     Derive this explicitly: log ζ = -Σ_p log(1-p^{-s}) = Σ_p Σ_k p^{-ks}/k,
     then differentiate.

  2. Perron's formula — "the smart integration":
       (1/2πi) ∫_{c-i∞}^{c+i∞} x^s/s ds = 1 if x>1, = 0 if 0<x<1
     A vertical-line contour integral acts as a step-function selector.
     Derive this via residue at s=0 for x>1 and closure to the right for x<1.

  3. Insert -ζ'/ζ into Perron's formula to get ψ(x) = Σ_{n≤x} Λ(n).
     Move the contour left: pick up residues at
       - s=1       → contributes x          (the main term, from the pole of ζ)
       - each zero ρ → contributes -x^ρ/ρ   (oscillatory corrections)
       - s=0 and trivial zeros → small correction terms

  4. Riemann's explicit formula:
       ψ(x) = x - Σ_ρ x^ρ/ρ - log(2π) - ½log(1 - x^{-2})
     An exact identity — primes entirely encoded by zeros.

  INTERACTIVE: animate partial sum x - Σ_{|Im(ρ)|≤T} x^ρ/ρ as T increases.
               Watch ψ(x) materialise from the oscillatory zero-contributions.
  See PLAN.md for full details.
