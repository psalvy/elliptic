  <h1>The Prime Number Theorem and the Riemann Hypothesis</h1>

  <!-- PLAN ---------------------------------------------------------------
  1. The Prime Number Theorem (PNT):
       π(x) ~ x / log x   as x → ∞
     Proved independently in 1896 by Hadamard and de la Vallée-Poussin.
     Key step: show there are no zeros on Re(s) = 1 (the boundary of the critical strip).

  2. From the explicit formula: the error in π(x) ≈ Li(x) is controlled by
     zero real parts:
       π(x) = Li(x) - Σ_ρ Li(x^ρ) + O(small)
     Each zero ρ contributes oscillatory error of size ~ x^{Re(ρ)} / log x.

  3. RH: all zeros have Re(ρ) = ½, giving error O(√x log x) — the best possible.
     Primes are as regularly distributed as they can be; no "conspiracy."

  4. Why it matters beyond number theory:
     - Generalised RH for L-functions of elliptic curves
     - Birch–Swinnerton-Dyer conjecture (another Millennium Problem)
     - Langlands program: all these zero-counting questions are part of one framework
     - Connection back to elliptic course: L-functions of CM curves have zeros
       whose distribution is controlled by CM class field theory

  See PLAN.md for full details.
