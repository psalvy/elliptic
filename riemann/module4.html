  <!-- PLAN ---------------------------------------------------------------
  1. Analogy: a polynomial is determined by its roots (up to scaling)
  2. Hadamard's theorem (1893): an entire function of finite order is
     completely determined by its zeros — the infinite-dimensional analogue
  3. The completed zeta function ξ(s) = ½s(s-1)π^{-s/2}Γ(s/2)ζ(s) is entire of order 1
  4. Its Hadamard product:
       ξ(s) = e^{A+Bs} ∏_ρ (1 - s/ρ) e^{s/ρ}
  5. Consequence: the zeros completely determine ζ(s); to understand primes,
     you must understand the zeros
  6. Parallel to elliptic course: the j-invariant fingerprints a torus;
     zeros fingerprint the distribution of primes
